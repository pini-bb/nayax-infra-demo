name: Bump Blueprint Version

on:
  pull_request:
    paths:
      - 'product-packages/**'

jobs:
  bump:
    name: Bump version on Renovate PRs
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BRICKS_API_KEY: ${{ secrets.BRICKS_API_KEY }}
      BRICKS_API_URL: https://api.bricks-dev.com
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install bricks CLI
        run: curl -fsSL https://brickscli.s3.eu-west-1.amazonaws.com/releases/latest/install.sh | bash

      - name: Detect changed packages and bump versions
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- product-packages/ | awk -F/ '{print $2}' | sort -u)
          for pkg in $CHANGED; do
            echo "Bumping version for $pkg"
            bricks bp bump --minor --src "product-packages/$pkg"
          done

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add product-packages/
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump blueprint version after dependency update"
            git push
          fi

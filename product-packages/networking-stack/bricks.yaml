name: networking_stack
version: 1.0.7
description: "VPC with public/private subnets across multiple AZs"

inputs:
  vpc_name:
    type: string
  cidr:
    type: string
    default: "10.0.0.0/16"
  azs:
    type: list(string)
    default: ["us-east-1a", "us-east-1b", "us-east-1c"]
  private_subnets:
    type: list(string)
    default: ["10.0.1.0/24", "10.0.2.0/24", "10.0.3.0/24"]
  public_subnets:
    type: list(string)
    default: ["10.0.101.0/24", "10.0.102.0/24", "10.0.103.0/24"]
  enable_nat_gateway:
    type: bool
    default: true
  single_nat_gateway:
    type: bool
    default: true
  environment:
    type: string
    default: "dev"
  region:
    type: string
    default: "us-east-1"

packages:
  - id: aws_vpc
    name: aws_vpc
    version: 5.21.0
    source: git::https://github.com/terraform-aws-modules/terraform-aws-vpc.git?ref=v6.6.0
    native:
      type: opentofu
      version: "1.11.4"
    props:
      name: inputs.vpc_name
      cidr: inputs.cidr
      azs: inputs.azs
      private_subnets: inputs.private_subnets
      public_subnets: inputs.public_subnets
      enable_nat_gateway: inputs.enable_nat_gateway
      single_nat_gateway: inputs.single_nat_gateway
      tags:
        environment: inputs.environment
      # Nullable Terraform module vars — hardcoded null so callers don't need to supply them
      ipv4_ipam_pool_id: ~
      ipv4_netmask_length: ~
      ipv6_cidr: ~
      ipv6_ipam_pool_id: ~
      ipv6_netmask_length: ~
      ipv6_cidr_block_network_border_group: ~
      outpost_arn: ~
      outpost_az: ~
      default_security_group_name: ~
      default_route_table_name: ~
      default_network_acl_name: ~
      default_vpc_name: ~
      vpn_gateway_az: ~
      redshift_subnet_group_name: ~
      elasticache_subnet_group_name: ~
      database_subnet_group_name: ~
      customer_owned_ipv4_pool: ~
      flow_log_cloudwatch_log_group_kms_key_id: ~
      flow_log_cloudwatch_log_group_class: ~
      flow_log_cloudwatch_log_group_retention_in_days: ~
      flow_log_deliver_cross_account_role: ~
      flow_log_log_format: ~
      flow_log_file_format: ~
      vpc_flow_log_permissions_boundary: ~
      enable_network_address_usage_metrics: ~
      dhcp_options_ipv6_address_preferred_lease_time: ~
      intra_subnet_private_dns_hostname_type_on_launch: ~
      public_subnet_private_dns_hostname_type_on_launch: ~
      outpost_subnet_private_dns_hostname_type_on_launch: ~
      private_subnet_private_dns_hostname_type_on_launch: ~
      database_subnet_private_dns_hostname_type_on_launch: ~
      redshift_subnet_private_dns_hostname_type_on_launch: ~
      elasticache_subnet_private_dns_hostname_type_on_launch: ~

outputs:
  vpc_id:
    value: data.aws_vpc.vpc_id
  vpc_cidr_block:
    value: data.aws_vpc.vpc_cidr_block
  private_subnets:
    value: data.aws_vpc.private_subnets
  public_subnets:
    value: data.aws_vpc.public_subnets
  private_route_table_ids:
    value: data.aws_vpc.private_route_table_ids
  nat_public_ips:
    value: data.aws_vpc.nat_public_ips
